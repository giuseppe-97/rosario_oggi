<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#f6f3ed" />
  <title>Rosario</title>

  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ed;
      --card: rgba(255, 255, 255, 0.78);
      --text: #1c1c1e;
      --muted: #6b7280;
      --line: rgba(28, 28, 30, 0.08);
      --btn: #ffffff;
      --btn-line: rgba(28, 28, 30, 0.12);
      --shadow: 0 10px 30px rgba(28, 28, 30, 0.05);
      --error-bg: #fff0f0;
      --error-border: #f3b6b6;
      --error-text: #7a1f1f;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      padding:
        max(12px, env(safe-area-inset-top))
        max(12px, env(safe-area-inset-right))
        max(18px, env(safe-area-inset-bottom))
        max(12px, env(safe-area-inset-left));
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
      min-height: calc(100svh - 30px);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 2px 2px;
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.05;
      font-weight: 700;
      text-transform: capitalize;
    }

    .meta {
      margin: 4px 0 0;
      font-size: 14px;
      color: var(--muted);
    }

    .ghost {
      min-height: 44px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--btn-line);
      background: rgba(255, 255, 255, 0.72);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      touch-action: manipulation;
    }

    .cards {
      display: grid;
      gap: 12px;
      padding-bottom: 8px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 16px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 700;
    }

    .paragraph {
      margin: 0;
      font-size: 19px;
      line-height: 1.6;
      letter-spacing: 0.01em;
      white-space: pre-wrap;
    }

    .actions {
      margin-top: 12px;
      display: flex;
      justify-content: flex-end;
    }

    .audio-btn {
      min-height: 44px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--btn-line);
      background: var(--btn);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      touch-action: manipulation;
    }

    .audio-btn:active,
    .ghost:active {
      transform: scale(0.98);
    }

    .note {
      margin: 2px 2px 0;
      font-size: 12px;
      color: var(--muted);
    }

    .errorbox {
      display: none;
      padding: 12px 14px;
      border-radius: 16px;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="topbar">
      <div>
        <div class="eyebrow">Meditazione di oggi</div>
        <h1 id="title">Caricamento…</h1>
        <p class="meta" id="meta"></p>
      </div>
      <button class="ghost" id="refreshBtn" type="button">Aggiorna</button>
    </header>

    <div id="errorbox" class="errorbox"></div>
    <section id="cards" class="cards" aria-label="Testo del giorno"></section>

    <p class="note">Gli audio partono solo con un tap, così restano discreti e affidabili su iPhone.</p>
  </main>

          text: `Diceva loro: "In verità io vi dico: vi sono alcuni, qui presenti, che non morranno prima di aver visto giungere il regno di Dio nella sua potenza". Sei giorni dopo, Gesù prese con sé Pietro, Giacomo e Giovanni e li condusse su un alto monte, in disparte, loro soli. Fu trasfigurato davanti a loro e le sue vesti divennero splendenti, bianchissime: nessun lavandaio sulla terra potrebbe renderle così bianche. E apparve loro Elia con Mosè e conversavano con Gesù. Prendendo la parola, Pietro disse a Gesù: "Rabbì, è bello per noi essere qui; facciamo tre capanne, una per te, una per Mosè e una per Elia". Non sapeva infatti che cosa dire, perché erano spaventati. Venne una nube che li coprì con la sua ombra e dalla nube uscì una voce: "Questi è il Figlio mio, l'amato: ascoltatelo!". E improvvisamente, guardandosi attorno, non videro più nessuno, se non Gesù solo, con loro.",
          audio: "Lu4_Mc 9_1-8.mp3"
        },
        {
          title: "5. Matteo 26,17-19.26-28",
          text: `Il primo giorno degli Azzimi, i discepoli si avvicinarono a Gesù e gli dissero: "Dove vuoi che prepariamo per te, perché tu possa mangiare la Pasqua?". Ed egli rispose: "Andate in città da un tale e ditegli: "Il Maestro dice: Il mio tempo è vicino; farò la Pasqua da te con i miei discepoli"". I discepoli fecero come aveva loro ordinato Gesù, e prepararono la Pasqua. Ora, mentre mangiavano, Gesù prese il pane, recitò la benedizione, lo spezzò e, mentre lo dava ai discepoli, disse: "Prendete, mangiate: questo è il mio corpo". Poi prese il calice, rese grazie e lo diede loro, dicendo: "Bevetene tutti, perché questo è il mio sangue dell'alleanza, che è versato per molti per il perdono dei peccati."`,
          audio: "Lu5_Mt 26_17-19.26-28.mp3"
        }
      ]
    };

    const cardsEl = document.getElementById("cards");
    const titleEl = document.getElementById("title");
    const metaEl = document.getElementById("meta");
    const refreshBtn = document.getElementById("refreshBtn");

    let currentAudio = null;
    let currentButton = null;
    let lastDateKey = "";

    const dateFormatter = new Intl.DateTimeFormat("it-IT", {
      weekday: "long",
      day: "numeric",
      month: "long",
      year: "numeric"
    });

    const fileUrl = (name) => `audio/${encodeURIComponent(name)}`;

    function setButtonState(button, playing) {
      button.textContent = playing ? "❚❚ Pausa" : "▶︎ Audio";
      button.setAttribute("aria-pressed", String(playing));
    }

    function stopOtherAudio() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }
      if (currentButton) {
        setButtonState(currentButton, false);
      }
      currentAudio = null;
      currentButton = null;
    }

    function makeAudioControl(src, index) {
      const wrap = document.createElement("div");
      wrap.className = "actions";

      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "audio-btn";
      btn.setAttribute("aria-label", `Riproduci audio del paragrafo ${index}`);
      btn.setAttribute("aria-pressed", "false");
      btn.textContent = "▶︎ Audio";

      const audio = document.createElement("audio");
      audio.preload = "none";
      audio.src = src;

      btn.addEventListener("click", async () => {
        if (!audio.src) return;

        if (currentAudio && currentAudio !== audio) {
          stopOtherAudio();
        }

        try {
          if (audio.paused) {
            await audio.play();
            currentAudio = audio;
            currentButton = btn;
            setButtonState(btn, true);
          } else {
            audio.pause();
            setButtonState(btn, false);
          }
        } catch (err) {
          console.error("Riproduzione audio fallita:", err);
        }
      });

      audio.addEventListener("ended", () => {
        if (currentAudio === audio) {
          currentAudio = null;
          currentButton = null;
        }
        setButtonState(btn, false);
        audio.currentTime = 0;
      });

      wrap.appendChild(btn);
      wrap.appendChild(audio);
      return wrap;
    }

    function render() {
      const now = new Date();
      lastDateKey = now.toDateString();

      const dayIndex = now.getDay();
      const group = DAY_TO_GROUP[dayIndex];

      titleEl.textContent = GROUP_LABEL[group];
      metaEl.textContent = `${DAY_NAMES[dayIndex]} · ${dateFormatter.format(now)}`;

      cardsEl.replaceChildren();
      stopOtherAudio();

      CONTENT[group].forEach((item, idx) => {
        const card = document.createElement("article");
        card.className = "card";

        const h2 = document.createElement("h2");
        h2.textContent = item.title;
        card.appendChild(h2);

        const p = document.createElement("p");
        p.className = "paragraph";
        p.textContent = item.text;
        card.appendChild(p);

        if (item.audio && item.audio.trim()) {
          card.appendChild(makeAudioControl(fileUrl(item.audio), idx + 1));
        }

        cardsEl.appendChild(card);
      });
    }

    function maybeRefresh() {
      const key = new Date().toDateString();
      if (key !== lastDateKey) render();
    }

    refreshBtn.addEventListener("click", render);
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) maybeRefresh();
    });

    setInterval(maybeRefresh, 60_000);
    render();
  </script>
</body>
</html>
